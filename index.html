<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foto Partite</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161a23;
      --card: #1e2330;
      --accent: #f0c040;
      --accent2: #e05a2b;
      --text: #eef0f5;
      --muted: #7a8099;
      --border: #2a2f3e;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: 2px;
    }
    header .sub {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── SCREENS ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── SCREEN 1: scelta partita ── */
    #screen-partita {
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
    }
    #screen-partita h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      color: var(--accent);
      margin-bottom: 8px;
    }
    #screen-partita p {
      color: var(--muted);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .partita-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .partita-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .partita-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--accent);
      transform: scaleY(0);
      transition: transform 0.2s;
      transform-origin: bottom;
    }
    .partita-card:hover::before { transform: scaleY(1); }
    .partita-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(240,192,64,0.12);
    }
    .partita-card .data {
      font-size: 0.75rem;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .partita-card .nome {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--text);
      margin-bottom: 4px;
    }
    .partita-card .desc {
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* ── SCREEN 2: nome genitore ── */
    #screen-nome {
      max-width: 480px;
      margin: 80px auto;
      padding: 0 20px;
    }
    #screen-nome h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--accent);
      margin-bottom: 8px;
    }
    #screen-nome p { color: var(--muted); margin-bottom: 28px; font-size: 0.9rem; }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .form-group input {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      padding: 14px 28px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: #f7d060; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      padding: 10px 20px;
      font-size: 0.9rem;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: transparent; }

    /* ── SCREEN 3: galleria foto ── */
    #screen-foto { padding: 24px 28px; }

    .foto-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }
    .foto-header-left h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--accent);
    }
    .foto-header-left .info {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .foto-header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .counter-badge {
      background: var(--accent2);
      color: white;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      display: none;
    }
    .counter-badge.visible { display: inline-block; }

    /* ── GALLERY GRID ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .foto-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
      aspect-ratio: 4/3;
      background: var(--card);
    }
    .foto-item:hover { transform: scale(1.02); }
    .foto-item.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(240,192,64,0.3);
    }
    .foto-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s;
    }
    .foto-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(240,192,64,0.15);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .foto-item.selected .overlay { opacity: 1; }

    /* Checkbox visivo */
    .foto-item .check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .foto-item.selected .check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .foto-item .check svg {
      opacity: 0;
      transition: opacity 0.15s;
    }
    .foto-item.selected .check svg { opacity: 1; }

    /* Nome foto */
    .foto-item .foto-nome {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(13,15,20,0.9));
      padding: 20px 10px 8px;
      font-size: 0.72rem;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .foto-item:hover .foto-nome, .foto-item.selected .foto-nome { opacity: 1; }

    /* Loading */
    .loading-stato {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BARRA INVIO FISSA ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 2px solid var(--accent);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
    }
    .bottom-bar.visible { transform: translateY(0); }
    .bottom-bar .selezione-info {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .bottom-bar .selezione-info strong { color: var(--accent); font-size: 1.1rem; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e2a1a;
      color: #7dca6b;
      border: 1px solid #3a5a35;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.errore {
      background: #2a1a1a;
      color: #ca6b6b;
      border-color: #5a3535;
    }

    /* ── MODALE CONFERMA ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 300;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      max-width: 420px;
      width: 90%;
      transform: scale(0.95);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .modal p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 8px; }
    .modal .lista-foto {
      background: var(--card);
      border-radius: 8px;
      padding: 12px 16px;
      margin: 16px 0;
      max-height: 180px;
      overflow-y: auto;
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.8;
    }
    .modal .azioni {
      display: flex; gap: 12px; margin-top: 20px;
    }

    /* Padding bottom per galleria quando barra visibile */
    #screen-foto.con-barra { padding-bottom: 90px; }

    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      #screen-foto { padding: 16px; }
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
      .bottom-bar { padding: 12px 16px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">⚽ Foto Partite</div>
    <div class="sub">Seleziona le tue foto</div>
  </div>
</header>

<!-- SCREEN 1: Scelta partita -->
<div id="screen-partita" class="screen active">
  <h2>Scegli la Partita</h2>
  <p>Clicca sulla partita per vedere tutte le foto disponibili.</p>
  <div class="partita-grid" id="partita-grid">
    <!-- Generato da foto.js -->
  </div>
</div>

<!-- SCREEN 2: Inserisci nome -->
<div id="screen-nome" class="screen">
  <h2>I tuoi dati</h2>
  <p>Prima di vedere le foto, inserisci il tuo nome.</p>
  <div class="form-group">
    <label>Il tuo nome e cognome</label>
    <input type="text" id="input-nome" placeholder="Es. Mario Rossi" autocomplete="name"/>
  </div>
  <div style="display:flex; gap:12px; flex-wrap:wrap;">
    <button class="btn btn-outline" onclick="torna()">← Indietro</button>
    <button class="btn" onclick="confermaPartita()">Vedi le foto →</button>
  </div>
</div>

<!-- SCREEN 3: Galleria -->
<div id="screen-foto" class="screen">
  <div class="foto-header">
    <div class="foto-header-left">
      <h2 id="titolo-partita">Partita</h2>
      <div class="info" id="info-genitore"></div>
    </div>
    <div class="foto-header-right">
      <span class="counter-badge" id="counter-badge">0 selezionate</span>
      <button class="btn btn-outline" onclick="tornaAllePartite()" style="font-family:'DM Sans',sans-serif; font-size:0.85rem; letter-spacing:0;">← Partite</button>
    </div>
  </div>

  <div id="gallery-container">
    <div class="loading-stato">
      <div class="spinner"></div>
      <div>Caricamento foto...</div>
    </div>
  </div>
</div>

<!-- BARRA INVIO FISSA -->
<div class="bottom-bar" id="bottom-bar">
  <div class="selezione-info">
    <strong id="n-selezionate">0</strong> foto selezionate
  </div>
  <button class="btn" id="btn-invia" onclick="apriModale()">Invia richiesta →</button>
</div>

<!-- MODALE CONFERMA -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Conferma richiesta</h3>
    <p id="modal-riepilogo"></p>
    <div class="lista-foto" id="modal-lista"></div>
    <p style="font-size:0.78rem;">Riceverai conferma dal fotografo.</p>
    <div class="azioni">
      <button class="btn btn-outline" onclick="chiudiModale()">Annulla</button>
      <button class="btn" id="btn-conferma-invio" onclick="inviaRichiesta()">Conferma e invia</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="foto.js"></script>

</body>
</html>
